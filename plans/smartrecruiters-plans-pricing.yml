specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: SmartRecruiters
providerId: smartrecruiters
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Human Resources
  - Recruiting
  - Talent Acquisition
  - Applicant Tracking
description: SmartRecruiters publishes four plan tiers (Essential, Professional, High Volume,
  Complete). Only Essential carries a public starting price (USD 14,995); higher tiers require
  contacting sales. Plans are differentiated by AI capabilities, candidate-screening volume, SMS
  messaging, job-distribution capacity, sandbox access, and analytics depth.
sources:
  - https://www.smartrecruiters.com/pricing/
plans:
  - id: smartrecruiters-essential
    name: Essential
    type: subscription
    description: Entry plan starting at USD 14,995 (annual). Includes Applicant Tracking, CRM,
      Onboarding, SMS Messaging, Job Distribution, and Dynamic Scheduling.
    entries:
      - label: Subscription Fee (Starting)
        name: subscription_fee
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: 'starting at USD 14,995'
        userMultiplied: false
    elements:
      - name: Applicant Tracking
      - name: CRM
      - name: Onboarding
      - name: SMS Messaging
      - name: Job Distribution
      - name: Dynamic Scheduling
  - id: smartrecruiters-professional
    name: Professional
    type: subscription
    description: Adds AI-powered Hiring Agent, AI Talent Matching Engine, and access to add-on
      features. Pricing not publicly listed.
    entries:
      - label: Subscription Fee
        name: subscription_fee
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: Everything in Essential
      - name: AI-Powered Hiring Agent
      - name: AI Talent Matching Engine
      - name: Add-On Feature Access
  - id: smartrecruiters-high-volume
    name: High Volume
    type: subscription
    description: Adds AI-powered Candidate Screening, Conversational AI Chat, and increased SMS /
      job-distribution volume. Marketed as "Most Popular." Pricing not publicly listed.
    entries:
      - label: Subscription Fee
        name: subscription_fee
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: Everything in Professional
      - name: AI-Powered Candidate Screening
      - name: Conversational AI Chat
      - name: Increased SMS Volume
      - name: Increased Job-Distribution Volume
  - id: smartrecruiters-complete
    name: Complete
    type: enterprise
    description: Top tier with Advanced Analytics, Advanced Sandbox, and Custom In-App Guidance.
      Pricing not publicly listed.
    entries:
      - label: Subscription Fee
        name: subscription_fee
        type: subscription
        metric: year
        limit: 1
        timeFrame: year
        geo: global
        unit: 1
        price: 'contact sales'
        userMultiplied: false
    elements:
      - name: Everything in High Volume
      - name: Advanced Analytics
      - name: Advanced Sandbox
      - name: Custom In-App Guidance
