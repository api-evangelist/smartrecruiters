naftiko: "1.0.0-alpha1"

info:
  label: SmartRecruiters Candidate API
  description: >-
    The SmartRecruiters Candidate API provides full candidate profile management
    including importing, updating, and tracking candidates across job applications.
  tags:
    - SmartRecruiters
    - Candidates
    - Applicants
    - Talent Acquisition
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMARTRECRUITERS_API_KEY: SMARTRECRUITERS_API_KEY

capability:
  consumes:
    - type: http
      namespace: smartrecruiters-candidates
      baseUri: https://api.smartrecruiters.com
      description: SmartRecruiters Candidate API for candidate profile management
      authentication:
        type: apikey
        key: X-SmartToken
        value: "{{SMARTRECRUITERS_API_KEY}}"
        placement: header
      resources:
        - name: candidates
          path: /candidates
          description: Candidate profile management
          operations:
            - name: list-candidates
              method: GET
              description: List candidates with optional filtering
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: Search by name or email
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-candidate
              method: POST
              description: Import a new candidate profile
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  email: "{{tools.email}}"

        - name: candidate
          path: /candidates/{candidateId}
          description: Individual candidate management
          operations:
            - name: get-candidate
              method: GET
              description: Get a candidate profile
              inputParameters:
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-candidate
              method: PATCH
              description: Update candidate profile properties
              inputParameters:
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"

        - name: candidate-applications
          path: /candidates/{candidateId}/applications
          description: Candidate application history
          operations:
            - name: list-candidate-applications
              method: GET
              description: List all applications for a candidate
              inputParameters:
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: candidate-messages
          path: /candidates/{candidateId}/messages
          description: Candidate notes and messages
          operations:
            - name: list-candidate-messages
              method: GET
              description: List notes and messages for a candidate
              inputParameters:
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-candidate-message
              method: POST
              description: Add a note or message to a candidate profile
              inputParameters:
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  message: "{{tools.message}}"

        - name: candidate-documents
          path: /candidates/{candidateId}/documents
          description: Candidate document attachments
          operations:
            - name: list-candidate-documents
              method: GET
              description: List documents attached to a candidate
              inputParameters:
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: smartrecruiters-candidates-rest
      resources:
        - path: /v1/candidates
          name: candidates
          description: Candidate profiles
          operations:
            - method: GET
              name: list-candidates
              description: List candidates
              call: "smartrecruiters-candidates.list-candidates"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/candidates/{candidateId}
          name: candidate
          description: Individual candidate
          operations:
            - method: GET
              name: get-candidate
              description: Get a candidate profile
              call: "smartrecruiters-candidates.get-candidate"
              with:
                candidateId: "rest.candidateId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: smartrecruiters-candidates-mcp
      transport: http
      tools:
        - name: list-candidates
          description: Search and list candidate profiles
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-candidates.list-candidates"
          with:
            q: "tools.q"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-candidate
          description: Get a specific candidate's full profile
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-candidates.get-candidate"
          with:
            candidateId: "tools.candidateId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-candidate
          description: Import a new candidate into the system
          hints:
            readOnly: false
            destructive: false
          call: "smartrecruiters-candidates.create-candidate"
          with:
            firstName: "tools.firstName"
            lastName: "tools.lastName"
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-candidate
          description: Update a candidate's profile information
          hints:
            readOnly: false
            idempotent: false
          call: "smartrecruiters-candidates.update-candidate"
          with:
            candidateId: "tools.candidateId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-candidate-applications
          description: List all job applications for a candidate
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-candidates.list-candidate-applications"
          with:
            candidateId: "tools.candidateId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-candidate-messages
          description: List notes and messages on a candidate profile
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-candidates.list-candidate-messages"
          with:
            candidateId: "tools.candidateId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-candidate-message
          description: Add a note or message to a candidate profile
          hints:
            readOnly: false
            destructive: false
          call: "smartrecruiters-candidates.create-candidate-message"
          with:
            candidateId: "tools.candidateId"
            message: "tools.message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-candidate-documents
          description: List documents and attachments for a candidate
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-candidates.list-candidate-documents"
          with:
            candidateId: "tools.candidateId"
          outputParameters:
            - type: object
              mapping: "$."
