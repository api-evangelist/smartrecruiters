naftiko: "1.0.0-alpha1"

info:
  label: SmartRecruiters Posting API
  description: >-
    The SmartRecruiters Posting API provides access to published job postings
    for building career sites and submitting candidate applications.
  tags:
    - SmartRecruiters
    - Jobs
    - Postings
    - Recruiting
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMARTRECRUITERS_API_KEY: SMARTRECRUITERS_API_KEY

capability:
  consumes:
    - type: http
      namespace: smartrecruiters-posting
      baseUri: https://api.smartrecruiters.com
      description: SmartRecruiters Posting API for career site and application management
      authentication:
        type: apikey
        key: X-SmartToken
        value: "{{SMARTRECRUITERS_API_KEY}}"
        placement: header
      resources:
        - name: postings
          path: /v1/companies/{companyIdentifier}/postings
          description: Job postings management
          operations:
            - name: list-postings
              method: GET
              description: List active job postings for a company
              inputParameters:
                - name: companyIdentifier
                  in: path
                  type: string
                  required: true
                  description: The company identifier
                - name: q
                  in: query
                  type: string
                  required: false
                  description: Full-text search query
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results to return
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Results to skip for pagination
                - name: country
                  in: query
                  type: string
                  required: false
                  description: Filter by country code
                - name: department
                  in: query
                  type: string
                  required: false
                  description: Filter by department
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-posting
              method: GET
              description: Get detailed information for a specific job posting
              inputParameters:
                - name: companyIdentifier
                  in: path
                  type: string
                  required: true
                  description: The company identifier
                - name: postingId
                  in: path
                  type: string
                  required: true
                  description: The posting ID or UUID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: applications
          path: /v1/companies/{companyIdentifier}/postings/{postingId}/candidates
          description: Candidate application submission
          operations:
            - name: submit-application
              method: POST
              description: Submit a new candidate application for a job posting
              inputParameters:
                - name: companyIdentifier
                  in: path
                  type: string
                  required: true
                  description: The company identifier
                - name: postingId
                  in: path
                  type: string
                  required: true
                  description: The posting ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  email: "{{tools.email}}"

        - name: application-status
          path: /v1/companies/{companyIdentifier}/postings/{postingId}/candidates/{candidateId}/status
          description: Application status tracking
          operations:
            - name: get-application-status
              method: GET
              description: Get the application status for a specific candidate
              inputParameters:
                - name: companyIdentifier
                  in: path
                  type: string
                  required: true
                  description: The company identifier
                - name: postingId
                  in: path
                  type: string
                  required: true
                  description: The posting ID
                - name: candidateId
                  in: path
                  type: string
                  required: true
                  description: The candidate ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: smartrecruiters-posting-rest
      resources:
        - path: /v1/postings
          name: postings
          description: Job postings
          operations:
            - method: GET
              name: list-postings
              description: List active job postings
              call: "smartrecruiters-posting.list-postings"
              with:
                companyIdentifier: "rest.companyIdentifier"
                q: "rest.q"
                limit: "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/postings/{postingId}
          name: posting
          description: Single job posting
          operations:
            - method: GET
              name: get-posting
              description: Get a specific job posting
              call: "smartrecruiters-posting.get-posting"
              with:
                companyIdentifier: "rest.companyIdentifier"
                postingId: "rest.postingId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: smartrecruiters-posting-mcp
      transport: http
      tools:
        - name: list-postings
          description: Search and list active job postings for a company
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-posting.list-postings"
          with:
            companyIdentifier: "tools.companyIdentifier"
            q: "tools.q"
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-posting
          description: Get detailed information about a specific job posting
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-posting.get-posting"
          with:
            companyIdentifier: "tools.companyIdentifier"
            postingId: "tools.postingId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-application
          description: Submit a candidate application for a job posting
          hints:
            readOnly: false
            destructive: false
          call: "smartrecruiters-posting.submit-application"
          with:
            companyIdentifier: "tools.companyIdentifier"
            postingId: "tools.postingId"
            firstName: "tools.firstName"
            lastName: "tools.lastName"
            email: "tools.email"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application-status
          description: Get the current status of a candidate's application
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-posting.get-application-status"
          with:
            companyIdentifier: "tools.companyIdentifier"
            postingId: "tools.postingId"
            candidateId: "tools.candidateId"
          outputParameters:
            - type: object
              mapping: "$."
