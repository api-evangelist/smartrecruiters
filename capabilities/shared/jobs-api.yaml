naftiko: "1.0.0-alpha1"

info:
  label: SmartRecruiters Job API
  description: >-
    The SmartRecruiters Job API enables creating, reading, updating, and managing
    jobs through their full hiring lifecycle.
  tags:
    - SmartRecruiters
    - Jobs
    - Hiring
    - Recruiting
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SMARTRECRUITERS_API_KEY: SMARTRECRUITERS_API_KEY

capability:
  consumes:
    - type: http
      namespace: smartrecruiters-jobs
      baseUri: https://api.smartrecruiters.com
      description: SmartRecruiters Job API for job lifecycle management
      authentication:
        type: apikey
        key: X-SmartToken
        value: "{{SMARTRECRUITERS_API_KEY}}"
        placement: header
      resources:
        - name: jobs
          path: /jobs
          description: Job management
          operations:
            - name: list-jobs
              method: GET
              description: List jobs with optional filtering
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: false
                  description: Search query
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by job status
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum results
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: Pagination offset
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-job
              method: POST
              description: Create a new job opening
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  department: "{{tools.department}}"
                  location: "{{tools.location}}"

        - name: job
          path: /jobs/{jobId}
          description: Single job management
          operations:
            - name: get-job
              method: GET
              description: Get details for a specific job
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: The job ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-job
              method: PATCH
              description: Update properties of a job
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: The job ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"

        - name: job-status
          path: /jobs/{jobId}/status
          description: Job status management
          operations:
            - name: update-job-status
              method: PUT
              description: Update the status of a job
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: The job ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"

        - name: job-hiring-team
          path: /jobs/{jobId}/hiring-team
          description: Job hiring team management
          operations:
            - name: get-job-hiring-team
              method: GET
              description: Get the hiring team for a job
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: The job ID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: job-candidates
          path: /jobs/{jobId}/candidates
          description: Candidates for a specific job
          operations:
            - name: list-job-candidates
              method: GET
              description: List candidates who applied to a job
              inputParameters:
                - name: jobId
                  in: path
                  type: string
                  required: true
                  description: The job ID
                - name: status
                  in: query
                  type: string
                  required: false
                  description: Filter by candidate status
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: smartrecruiters-jobs-rest
      resources:
        - path: /v1/jobs
          name: jobs
          description: Job management
          operations:
            - method: GET
              name: list-jobs
              description: List all jobs
              call: "smartrecruiters-jobs.list-jobs"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/jobs/{jobId}
          name: job
          description: Single job
          operations:
            - method: GET
              name: get-job
              description: Get a specific job
              call: "smartrecruiters-jobs.get-job"
              with:
                jobId: "rest.jobId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: smartrecruiters-jobs-mcp
      transport: http
      tools:
        - name: list-jobs
          description: List jobs with optional status and query filters
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-jobs.list-jobs"
          with:
            q: "tools.q"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job
          description: Get detailed information about a specific job
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-jobs.get-job"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-job
          description: Create a new job opening
          hints:
            readOnly: false
            destructive: false
          call: "smartrecruiters-jobs.create-job"
          with:
            title: "tools.title"
            department: "tools.department"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-job-status
          description: Update the hiring status of a job
          hints:
            readOnly: false
            idempotent: true
          call: "smartrecruiters-jobs.update-job-status"
          with:
            jobId: "tools.jobId"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-job-hiring-team
          description: Get the hiring team assigned to a job
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-jobs.get-job-hiring-team"
          with:
            jobId: "tools.jobId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-job-candidates
          description: List candidates who applied to a specific job
          hints:
            readOnly: true
            openWorld: true
          call: "smartrecruiters-jobs.list-job-candidates"
          with:
            jobId: "tools.jobId"
            status: "tools.status"
          outputParameters:
            - type: object
              mapping: "$."
