naftiko: 1.0.0-alpha2
info:
  label: SmartRecruiters Candidate API — Applications
  description: 'SmartRecruiters Candidate API — Applications. 1 operations. Lead operation: List Candidate Applications. Self-contained
    Naftiko capability covering one Smartrecruiters business surface.'
  tags:
  - Smartrecruiters
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SMARTRECRUITERS_API_KEY: SMARTRECRUITERS_API_KEY
capability:
  consumes:
  - type: http
    namespace: candidates-applications
    baseUri: https://api.smartrecruiters.com
    description: SmartRecruiters Candidate API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: candidates-candidateId-applications
      path: /candidates/{candidateId}/applications
      operations:
      - name: listcandidateapplications
        method: GET
        description: List Candidate Applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: candidateId
          in: path
          type: string
          description: The unique candidate identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.SMARTRECRUITERS_API_KEY}}'
  exposes:
  - type: rest
    namespace: candidates-applications-rest
    port: 8080
    description: REST adapter for SmartRecruiters Candidate API — Applications. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/candidates/{candidateid}/applications
      name: candidates-candidateid-applications
      description: REST surface for candidates-candidateId-applications.
      operations:
      - method: GET
        name: listcandidateapplications
        description: List Candidate Applications
        call: candidates-applications.listcandidateapplications
        with:
          candidateId: rest.candidateId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: candidates-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for SmartRecruiters Candidate API — Applications. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-candidate-applications
      description: List Candidate Applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: candidates-applications.listcandidateapplications
      with:
        candidateId: tools.candidateId
      outputParameters:
      - type: object
        mapping: $.
