description: 'FOCUS-aligned FinOps for SmartRecruiters: tiered annual subscription with Essential
  starting at USD 14,995; higher tiers contact-sales. Plan caps cover SMS messaging volume, job
  distribution capacity, and AI screening usage.'
sources:
  - https://www.smartrecruiters.com/pricing/
  - https://developers.smartrecruiters.com/docs/rate-limiting
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
focusColumns:
  ServiceName: SmartRecruiters
  ServiceCategory: Talent Acquisition / ATS
  ProviderName: SmartRecruiters
  PublisherName: SmartRecruiters, Inc.
  InvoiceIssuerName: SmartRecruiters, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: subscription_year
    description: Annual subscription fee for the selected plan tier (Essential, Professional, High
      Volume, Complete).
    unit: year
    aggregation: sum
    dimensions:
      - plan
  - name: sms_messages
    description: SMS messages sent through SmartRecruiters; volume cap varies by tier.
    unit: varies
    aggregation: sum
    dimensions:
      - plan
      - country
  - name: job_distributions
    description: Job-board distribution events; capacity varies by tier.
    unit: varies
    aggregation: sum
    dimensions:
      - plan
      - job_board
  - name: ai_screenings
    description: AI candidate-screening invocations (High Volume and above).
    unit: varies
    aggregation: sum
    dimensions:
      - plan
  - name: api_calls
    description: Public API calls subject to the documented per-credential request-rate and
      concurrency caps.
    unit: request
    aggregation: sum
    dimensions:
      - credential
      - endpoint_class
principles:
  - name: Visibility
    description: Use SmartRecruiters reporting + Reporting API for hiring-funnel telemetry; track
      X-RateLimit-Remaining and X-RateLimit-Concurrent-Remaining headers to spot integration cost
      pressure points.
  - name: Allocation
    description: Allocate spend per hiring department / region using SmartRecruiters' org structure;
      tag SMS and job-distribution charges by requisition owner.
  - name: Optimization
    description: Reduce job-distribution waste by deactivating boards with low conversion; throttle
      integrations against the documented 10 RPS / 8 concurrent caps to avoid retry storms; use the
      Reporting API for bulk extracts rather than transactional endpoints.
  - name: Accountability
    description: Talent-acquisition platform owner reviews monthly tier utilization (SMS, jobs, AI
      screenings, seats) and sponsors tier-upgrade or renewal decisions.
maintainers:
